<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration & Onboarding Flow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-ring { animation: pulseRing 1.5s ease-out infinite; }
    @keyframes pulseRing { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.3); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    /* ─────────── Shared UI Components ─────────── */
    function ProgressBar({ step, total }) {
      const pct = ((step) / (total - 1)) * 100;
      return (
        <div className="w-full mb-8">
          <div className="flex justify-between text-xs text-gray-400 mb-1">
            <span>Step {step + 1} of {total}</span>
            <span>{Math.round(pct)}%</span>
          </div>
          <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
            <div className="h-full bg-indigo-500 rounded-full transition-all duration-500" style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    }

    function Button({ children, onClick, disabled, variant = "primary", className = "" }) {
      const base = "px-6 py-3 rounded-lg font-semibold text-sm transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed";
      const styles = {
        primary: "bg-indigo-600 text-white hover:bg-indigo-700 active:bg-indigo-800 shadow-sm",
        secondary: "bg-white text-gray-700 border border-gray-300 hover:bg-gray-50",
        ghost: "text-indigo-600 hover:text-indigo-700 hover:bg-indigo-50",
      };
      return <button onClick={onClick} disabled={disabled} className={`${base} ${styles[variant]} ${className}`}>{children}</button>;
    }

    function Input({ label, type = "text", value, onChange, placeholder, error, ...rest }) {
      return (
        <div className="mb-4">
          {label && <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
          <input
            type={type} value={value} onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            className={`w-full px-4 py-3 rounded-lg border ${error ? "border-red-400" : "border-gray-300"} text-gray-900 placeholder-gray-400 transition`}
            {...rest}
          />
          {error && <p className="text-red-500 text-xs mt-1">{error}</p>}
        </div>
      );
    }

    function Card({ children, className = "" }) {
      return <div className={`bg-white rounded-2xl shadow-lg p-8 ${className}`}>{children}</div>;
    }

    function SelectableCard({ selected, onClick, children, className = "" }) {
      return (
        <button
          onClick={onClick}
          className={`p-4 rounded-xl border-2 text-left transition-all duration-200 w-full ${
            selected ? "border-indigo-500 bg-indigo-50 shadow-md" : "border-gray-200 bg-white hover:border-gray-300 hover:shadow-sm"
          } ${className}`}
        >
          {children}
        </button>
      );
    }

    /* ─────────── Step 1: Welcome ─────────── */
    function StepWelcome({ next }) {
      return (
        <div className="fade-in text-center">
          <div className="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg className="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <h1 className="text-3xl font-bold text-gray-900 mb-3">Welcome to Acme</h1>
          <p className="text-gray-500 mb-8 max-w-sm mx-auto">
            The all-in-one platform that helps you build, ship, and grow your product faster than ever.
          </p>
          <Button onClick={next} className="w-full max-w-xs mx-auto">Get Started</Button>
          <p className="text-xs text-gray-400 mt-4">Already have an account? <button className="text-indigo-600 hover:underline">Sign in</button></p>
        </div>
      );
    }

    /* ─────────── Step 2: Create Account ─────────── */
    function StepCreateAccount({ data, update, next, back }) {
      const [errors, setErrors] = useState({});
      const validate = () => {
        const e = {};
        if (!data.email) e.email = "Email is required";
        else if (!/\S+@\S+\.\S+/.test(data.email)) e.email = "Invalid email address";
        if (!data.password) e.password = "Password is required";
        else if (data.password.length < 8) e.password = "Must be at least 8 characters";
        if (data.password !== data.confirmPassword) e.confirmPassword = "Passwords do not match";
        setErrors(e);
        return Object.keys(e).length === 0;
      };
      return (
        <div className="fade-in">
          <h2 className="text-2xl font-bold text-gray-900 mb-1">Create your account</h2>
          <p className="text-gray-500 mb-6 text-sm">Enter your details to get started.</p>
          <Input label="Email" type="email" value={data.email || ""} onChange={v => update({ email: v })} placeholder="you@example.com" error={errors.email} />
          <Input label="Password" type="password" value={data.password || ""} onChange={v => update({ password: v })} placeholder="Min. 8 characters" error={errors.password} />
          <Input label="Confirm Password" type="password" value={data.confirmPassword || ""} onChange={v => update({ confirmPassword: v })} placeholder="Re-enter password" error={errors.confirmPassword} />
          <div className="flex items-center gap-2 mb-6">
            <input type="checkbox" checked={data.terms || false} onChange={e => update({ terms: e.target.checked })} className="w-4 h-4 text-indigo-600 rounded border-gray-300" />
            <span className="text-xs text-gray-500">I agree to the <button className="text-indigo-600 hover:underline">Terms of Service</button> and <button className="text-indigo-600 hover:underline">Privacy Policy</button></span>
          </div>
          <div className="flex gap-3">
            <Button variant="secondary" onClick={back}>Back</Button>
            <Button onClick={() => validate() && next()} disabled={!data.terms} className="flex-1">Continue</Button>
          </div>
          <div className="mt-6 flex items-center gap-3">
            <div className="flex-1 h-px bg-gray-200" />
            <span className="text-xs text-gray-400">or continue with</span>
            <div className="flex-1 h-px bg-gray-200" />
          </div>
          <div className="mt-4 flex gap-3">
            <button className="flex-1 flex items-center justify-center gap-2 py-2.5 border border-gray-300 rounded-lg hover:bg-gray-50 text-sm font-medium text-gray-700">
              <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Google
            </button>
            <button className="flex-1 flex items-center justify-center gap-2 py-2.5 border border-gray-300 rounded-lg hover:bg-gray-50 text-sm font-medium text-gray-700">
              <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
              GitHub
            </button>
          </div>
        </div>
      );
    }

    /* ─────────── Step 3: Email Verification ─────────── */
    function StepVerifyEmail({ data, update, next, back }) {
      const [code, setCode] = useState(["", "", "", "", "", ""]);
      const [timer, setTimer] = useState(59);
      useEffect(() => {
        if (timer > 0) { const t = setTimeout(() => setTimer(timer - 1), 1000); return () => clearTimeout(t); }
      }, [timer]);
      const handleChange = (idx, val) => {
        if (val.length > 1) return;
        const c = [...code];
        c[idx] = val;
        setCode(c);
        if (val && idx < 5) document.getElementById(`code-${idx + 1}`)?.focus();
      };
      const filled = code.every(c => c !== "");
      return (
        <div className="fade-in text-center">
          <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg className="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </div>
          <h2 className="text-2xl font-bold text-gray-900 mb-1">Verify your email</h2>
          <p className="text-gray-500 text-sm mb-6">We sent a 6-digit code to <span className="font-medium text-gray-700">{data.email || "you@example.com"}</span></p>
          <div className="flex justify-center gap-2 mb-6">
            {code.map((c, i) => (
              <input
                key={i} id={`code-${i}`} type="text" inputMode="numeric" maxLength={1}
                value={c} onChange={e => handleChange(i, e.target.value)}
                className="w-12 h-14 text-center text-xl font-bold border border-gray-300 rounded-lg focus:border-indigo-500"
              />
            ))}
          </div>
          <Button onClick={next} disabled={!filled} className="w-full max-w-xs mx-auto mb-3">Verify</Button>
          <p className="text-xs text-gray-400">
            {timer > 0 ? `Resend code in ${timer}s` : <button onClick={() => setTimer(59)} className="text-indigo-600 hover:underline">Resend code</button>}
          </p>
          <button onClick={back} className="text-xs text-gray-400 hover:text-gray-600 mt-3">Go back</button>
        </div>
      );
    }

    /* ─────────── Step 4: Personal Info ─────────── */
    function StepPersonalInfo({ data, update, next, back }) {
      const [errors, setErrors] = useState({});
      const validate = () => {
        const e = {};
        if (!data.firstName?.trim()) e.firstName = "First name is required";
        if (!data.lastName?.trim()) e.lastName = "Last name is required";
        setErrors(e);
        return Object.keys(e).length === 0;
      };
      return (
        <div className="fade-in">
          <h2 className="text-2xl font-bold text-gray-900 mb-1">Tell us about yourself</h2>
          <p className="text-gray-500 text-sm mb-6">This helps us personalize your experience.</p>
          <div className="grid grid-cols-2 gap-4">
            <Input label="First Name" value={data.firstName || ""} onChange={v => update({ firstName: v })} placeholder="Jane" error={errors.firstName} />
            <Input label="Last Name" value={data.lastName || ""} onChange={v => update({ lastName: v })} placeholder="Doe" error={errors.lastName} />
          </div>
          <Input label="Job Title (optional)" value={data.jobTitle || ""} onChange={v => update({ jobTitle: v })} placeholder="e.g. Product Manager" />
          <div className="mb-4">
            <label className="block text-sm font-medium text-gray-700 mb-1">Company Size</label>
            <select value={data.companySize || ""} onChange={e => update({ companySize: e.target.value })} className="w-full px-4 py-3 rounded-lg border border-gray-300 text-gray-900">
              <option value="">Select...</option>
              <option value="1">Just me</option>
              <option value="2-10">2-10 people</option>
              <option value="11-50">11-50 people</option>
              <option value="51-200">51-200 people</option>
              <option value="201+">201+ people</option>
            </select>
          </div>
          <div className="flex gap-3 mt-6">
            <Button variant="secondary" onClick={back}>Back</Button>
            <Button onClick={() => validate() && next()} className="flex-1">Continue</Button>
          </div>
        </div>
      );
    }

    /* ─────────── Step 5: Avatar / Profile Picture ─────────── */
    function StepAvatar({ data, update, next, back }) {
      const initials = ((data.firstName?.[0] || "") + (data.lastName?.[0] || "")).toUpperCase() || "?";
      const colors = ["bg-indigo-500","bg-pink-500","bg-emerald-500","bg-amber-500","bg-cyan-500","bg-violet-500"];
      const [selectedColor, setSelectedColor] = useState(data.avatarColor || colors[0]);
      return (
        <div className="fade-in text-center">
          <h2 className="text-2xl font-bold text-gray-900 mb-1">Set up your profile</h2>
          <p className="text-gray-500 text-sm mb-6">Choose an avatar color or upload a photo.</p>
          <div className={`w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 text-white text-3xl font-bold ${selectedColor}`}>
            {initials}
          </div>
          <div className="flex justify-center gap-3 mb-6">
            {colors.map(c => (
              <button key={c} onClick={() => { setSelectedColor(c); update({ avatarColor: c }); }}
                className={`w-8 h-8 rounded-full ${c} ${selectedColor === c ? "ring-2 ring-offset-2 ring-indigo-500" : ""}`} />
            ))}
          </div>
          <button className="text-sm text-indigo-600 hover:underline mb-8 block mx-auto">Upload a photo instead</button>
          <div className="flex gap-3">
            <Button variant="secondary" onClick={back}>Back</Button>
            <Button onClick={next} className="flex-1">Continue</Button>
          </div>
        </div>
      );
    }

    /* ─────────── Step 6: Use Case ─────────── */
    function StepUseCase({ data, update, next, back }) {
      const cases = [
        { id: "product", icon: "M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4", label: "Product Development", desc: "Build and iterate on your product" },
        { id: "marketing", icon: "M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z", label: "Marketing & Growth", desc: "Drive acquisition and retention" },
        { id: "engineering", icon: "M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4", label: "Engineering", desc: "Ship code and manage infrastructure" },
        { id: "design", icon: "M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z", label: "Design", desc: "Create and prototype experiences" },
      ];
      return (
        <div className="fade-in">
          <h2 className="text-2xl font-bold text-gray-900 mb-1">What brings you here?</h2>
          <p className="text-gray-500 text-sm mb-6">Select the area that best describes your primary use case.</p>
          <div className="grid grid-cols-2 gap-3 mb-6">
            {cases.map(c => (
              <SelectableCard key={c.id} selected={data.useCase === c.id} onClick={() => update({ useCase: c.id })}>
                <svg className="w-6 h-6 text-indigo-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={c.icon} />
                </svg>
                <p className="font-semibold text-sm text-gray-900">{c.label}</p>
                <p className="text-xs text-gray-500 mt-0.5">{c.desc}</p>
              </SelectableCard>
            ))}
          </div>
          <div className="flex gap-3">
            <Button variant="secondary" onClick={back}>Back</Button>
            <Button onClick={next} disabled={!data.useCase} className="flex-1">Continue</Button>
          </div>
        </div>
      );
    }

    /* ─────────── Step 7: Preferences ─────────── */
    function StepPreferences({ data, update, next, back }) {
      const toggle = key => update({ [key]: !data[key] });
      const prefs = [
        { key: "prefEmail", label: "Email notifications", desc: "Product updates and announcements" },
        { key: "prefWeekly", label: "Weekly digest", desc: "A summary of your activity each week" },
        { key: "prefTips", label: "Tips & tutorials", desc: "Learn how to get the most out of Acme" },
        { key: "prefMarketing", label: "Marketing emails", desc: "Special offers and partner content" },
      ];
      return (
        <div className="fade-in">
          <h2 className="text-2xl font-bold text-gray-900 mb-1">Notification preferences</h2>
          <p className="text-gray-500 text-sm mb-6">Choose how you'd like to hear from us. You can change these anytime.</p>
          <div className="space-y-3 mb-6">
            {prefs.map(p => (
              <div key={p.key} className="flex items-center justify-between p-4 rounded-xl border border-gray-200">
                <div>
                  <p className="text-sm font-medium text-gray-900">{p.label}</p>
                  <p className="text-xs text-gray-500">{p.desc}</p>
                </div>
                <button onClick={() => toggle(p.key)}
                  className={`w-11 h-6 rounded-full relative transition-colors ${data[p.key] ? "bg-indigo-600" : "bg-gray-300"}`}>
                  <span className={`block w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${data[p.key] ? "left-6" : "left-1"}`} />
                </button>
              </div>
            ))}
          </div>
          <div className="flex gap-3">
            <Button variant="secondary" onClick={back}>Back</Button>
            <Button onClick={next} className="flex-1">Continue</Button>
          </div>
        </div>
      );
    }

    /* ─────────── Step 8: Team / Workspace ─────────── */
    function StepWorkspace({ data, update, next, back }) {
      const [errors, setErrors] = useState({});
      const validate = () => {
        const e = {};
        if (!data.workspaceName?.trim()) e.workspaceName = "Workspace name is required";
        setErrors(e);
        return Object.keys(e).length === 0;
      };
      return (
        <div className="fade-in">
          <h2 className="text-2xl font-bold text-gray-900 mb-1">Set up your workspace</h2>
          <p className="text-gray-500 text-sm mb-6">Create a workspace for your team to collaborate.</p>
          <Input label="Workspace Name" value={data.workspaceName || ""} onChange={v => update({ workspaceName: v })} placeholder="e.g. Acme Corp" error={errors.workspaceName} />
          <Input label="Workspace URL" value={data.workspaceSlug || ""} onChange={v => update({ workspaceSlug: v })} placeholder="acme-corp" />
          <div className="mb-4">
            <label className="block text-sm font-medium text-gray-700 mb-2">Invite team members (optional)</label>
            <div className="space-y-2">
              {(data.invites || [""]).map((email, i) => (
                <div key={i} className="flex gap-2">
                  <input
                    type="email" value={email} placeholder="colleague@company.com"
                    onChange={e => {
                      const inv = [...(data.invites || [""])];
                      inv[i] = e.target.value;
                      update({ invites: inv });
                    }}
                    className="flex-1 px-4 py-2.5 rounded-lg border border-gray-300 text-sm"
                  />
                  {i === (data.invites || [""]).length - 1 && (
                    <button onClick={() => update({ invites: [...(data.invites || [""]), ""] })}
                      className="px-3 py-2 text-indigo-600 border border-indigo-200 rounded-lg text-sm hover:bg-indigo-50">+</button>
                  )}
                </div>
              ))}
            </div>
          </div>
          <div className="flex gap-3 mt-6">
            <Button variant="secondary" onClick={back}>Back</Button>
            <Button onClick={() => validate() && next()} className="flex-1">Continue</Button>
          </div>
        </div>
      );
    }

    /* ─────────── Step 9: Complete / Success ─────────── */
    function StepComplete({ data }) {
      const name = data.firstName || "there";
      return (
        <div className="fade-in text-center">
          <div className="relative w-20 h-20 mx-auto mb-6">
            <div className="absolute inset-0 bg-green-200 rounded-full pulse-ring" />
            <div className="relative w-20 h-20 bg-green-100 rounded-full flex items-center justify-center">
              <svg className="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
              </svg>
            </div>
          </div>
          <h2 className="text-3xl font-bold text-gray-900 mb-2">You're all set, {name}!</h2>
          <p className="text-gray-500 mb-8 max-w-sm mx-auto">
            Your workspace <span className="font-medium text-gray-700">{data.workspaceName || "My Workspace"}</span> is ready.
            Let's start building something great.
          </p>
          <Button onClick={() => alert("Navigating to dashboard...")} className="w-full max-w-xs mx-auto mb-3">Go to Dashboard</Button>
          <button className="text-sm text-gray-400 hover:text-gray-600">Take a quick tour first</button>
          <div className="mt-10 grid grid-cols-3 gap-4 text-left max-w-md mx-auto">
            {[
              { icon: "M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253", title: "Read the docs", desc: "Learn the basics" },
              { icon: "M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z", title: "Join community", desc: "Connect with others" },
              { icon: "M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z", title: "Get support", desc: "We're here to help" },
            ].map((item, i) => (
              <button key={i} className="p-3 rounded-xl border border-gray-200 hover:border-indigo-300 hover:shadow-sm transition">
                <svg className="w-5 h-5 text-indigo-500 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={item.icon} />
                </svg>
                <p className="text-xs font-semibold text-gray-900">{item.title}</p>
                <p className="text-xs text-gray-400">{item.desc}</p>
              </button>
            ))}
          </div>
        </div>
      );
    }

    /* ─────────── Main App ─────────── */
    function App() {
      const TOTAL_STEPS = 9;
      const [step, setStep] = useState(0);
      const [data, setData] = useState({ prefEmail: true, prefWeekly: true, prefTips: true, prefMarketing: false, invites: [""] });

      const update = patch => setData(prev => ({ ...prev, ...patch }));
      const next = () => setStep(s => Math.min(s + 1, TOTAL_STEPS - 1));
      const back = () => setStep(s => Math.max(s - 1, 0));

      const steps = [
        <StepWelcome next={next} />,
        <StepCreateAccount data={data} update={update} next={next} back={back} />,
        <StepVerifyEmail data={data} update={update} next={next} back={back} />,
        <StepPersonalInfo data={data} update={update} next={next} back={back} />,
        <StepAvatar data={data} update={update} next={next} back={back} />,
        <StepUseCase data={data} update={update} next={next} back={back} />,
        <StepPreferences data={data} update={update} next={next} back={back} />,
        <StepWorkspace data={data} update={update} next={next} back={back} />,
        <StepComplete data={data} />,
      ];

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 flex items-center justify-center p-4">
          <div className="w-full max-w-lg">
            {step > 0 && step < TOTAL_STEPS - 1 && <ProgressBar step={step} total={TOTAL_STEPS} />}
            <Card className={step === 0 || step === TOTAL_STEPS - 1 ? "py-12" : ""}>
              {steps[step]}
            </Card>
            <p className="text-center text-xs text-gray-400 mt-6">Acme Inc. &mdash; Prototype</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
